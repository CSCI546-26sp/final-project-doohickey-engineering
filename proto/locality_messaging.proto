syntax = "proto3";

package locality_messaging;

message ChatMessage {
  string message_id = 1;
  string sender_id = 2;
  string payload = 3;
  int64 lamport_time = 4;
  int32 epoch = 5;
  bytes signature = 6;
}

message NodeInfo {
  string node_id = 1;
  string address = 2;
}

message LogSummary {
  string node_id = 1;
  int64 max_lamport_time = 2;
  uint32 log_hash = 3;
  int32 entry_count = 4;
}

message SyncLogsRequest {
  NodeInfo sender = 1;
  repeated ChatMessage logs = 2;
  LogSummary summary = 3;
}

message SyncLogsResponse {
  bool success = 1;
  int64 receiver_lamport_time = 2;
  LogSummary summary = 3;
}

service DataPlaneGossip {
  rpc SyncLogs(SyncLogsRequest) returns (SyncLogsResponse);
}

message LogEntry {
  int32 term = 1;
  enum CommandType {
    ADD_USER = 0;
    REVOKE_USER = 1;
  }
  CommandType type = 2;
  string target_user_id = 3;
}

message RequestVoteArgs {
  int32 term = 1;
  string candidate_id = 2;
  int32 last_log_index = 3;
  int32 last_log_term = 4;
}

message RequestVoteReply {
  int32 term = 1;
  bool vote_granted = 2;
}

message AppendEntriesArgs {
  int32 term = 1;
  string leader_id = 2;
  int32 prev_log_index = 3;
  int32 prev_log_term = 4;
  repeated LogEntry entries = 5;
  int32 leader_commit = 6;
}

message AppendEntriesReply {
  int32 term = 1;
  bool success = 2;
  int32 match_index = 3;
}

message AddUserRequest { string user_id = 1; }
message AddUserResponse { bool success = 1; int32 current_epoch = 2; }
message RevokeUserRequest { string user_id = 1; }
message RevokeUserResponse { bool success = 1; int32 new_epoch = 2; }
message ListUsersRequest {}
message ListUsersResponse {
  repeated string authorized_users = 1;
  int32 current_epoch = 2;
}
message CertificateRequest { string user_id = 1; }
message CertificateResponse {
  string user_id = 1;
  int32 epoch = 2;
}

service ControlPlaneRaft {
  rpc RequestVote(RequestVoteArgs) returns (RequestVoteReply);
  rpc AppendEntries(AppendEntriesArgs) returns (AppendEntriesReply);
  rpc AddUser(AddUserRequest) returns (AddUserResponse);
  rpc RevokeUser(RevokeUserRequest) returns (RevokeUserResponse);
  rpc ListUsers(ListUsersRequest) returns (ListUsersResponse);
  rpc GetCertificate(CertificateRequest) returns (CertificateResponse);
}

message AuthCheckRequest {
  string user_id = 1;
  int32 epoch = 2;
}

message AuthCheckResponse {
  bool is_authorized = 1;
}

service IntegrationAuth {
  rpc CheckAuthorization(AuthCheckRequest) returns (AuthCheckResponse);
}